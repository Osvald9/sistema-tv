<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV Player</title>
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/player/player.css">
</head>
<body>
  <!-- Container de Vídeo -->
  <div id="player-container">
    <video id="tv-video" muted playsinline preload="auto"></video>
  </div>
  
  <!-- Overlay de Status e Carregamento (invisível por padrão após iniciar) -->
  <div id="status-overlay" class="overlay active">
    <div class="status-content">
      <div class="spinner" id="spinner"></div>
      <h1 id="status-title">Conectando...</h1>
      <p id="status-desc">Buscando programação da TV</p>
      <div class="tv-badge" id="tv-badge">TV: --</div>
    </div>
  </div>

  <script src="/config.js?v=1.0.1"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/player/player.js?v=1.0.1"></script>
</body>
</html>
