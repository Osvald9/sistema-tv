<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV Player</title>
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/player/player.css">
</head>
<body>
  <!-- Container de Vídeo -->
  <div id="player-container">
    <video id="tv-video" autoplay muted playsinline preload="auto"></video>
  </div>
  
  <!-- Overlay de Status e Carregamento (invisível por padrão após iniciar) -->
  <div id="status-overlay" class="overlay active">
    <div class="status-content">
      <div class="spinner" id="spinner"></div>
      <h1 id="status-title">Conectando...</h1>
      <p id="status-desc">Buscando programação da TV</p>
      <div class="tv-badge" id="tv-badge">TV: --</div>
    </div>
  </div>

  <!-- Botão de Tela Cheia Autohide -->
  <button id="btn-fullscreen" class="fullscreen-btn" title="Tela Cheia">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="icon">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3.75v6.5m0-6.5h6.5m-6.5 0L9 9M3.75 20.25v-6.5m0 6.5h6.5m-6.5 0L9 15M20.25 3.75v6.5m0-6.5h-6.5m6.5 0L15 9m5.25 11.25v-6.5m0 6.5h-6.5m6.5 0L15 15" />
    </svg>
  </button>

  <script src="/config.js?v=1.0.1"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/player/player.js?v=1.0.2"></script>
</body>
</html>
